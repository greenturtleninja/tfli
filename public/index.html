<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFLI URI Shortener</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="" id="app">
        {{ message }}
        <table class="table-auto" v-if="show && list.length">
            <thead>
                <tr>
                <th>Shortened</th>
                <th>URI</th>
                <th>Expires</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="item of list">
                    <td>{{ item }}</td>
                    <td></td>
                    <td></td>
                </tr>
            </tbody>
        </table>
    </div>
    <script>
        const { createApp, ref } = Vue

        createApp({
            setup() {
                const message = ref('Hello vue!');
                const show = ref(true);
                const list = ref([1, 2, 3]);
            return {
                message, show, list
            }
            }
        }).mount('#app')
    </script>
  </body>
</html>
